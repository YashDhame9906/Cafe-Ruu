<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | FoodieHub</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <section class="checkout section">
        <div class="container">
            <p class="section-subtitle">Checkout</p>
            <h2 class="section-title">Complete Your Order</h2>

            <div class="checkout-box">
                <h3>Order Total: ₹<span id="checkoutTotal">0</span></h3>

                <form id="checkoutForm" class="checkout-form">
                    <input type="text" placeholder="Full Name" required>
                    <input type="tel" placeholder="Phone Number" required>
                    <input type="text" placeholder="Delivery Address" required>
                    <textarea rows="4" placeholder="Additional Notes (Optional)"></textarea>

                    <button type="submit" class="btn btn-primary">
                        Place Order
                    </button>
                </form>
            </div>
        </div>
    </section>

    <script src="js/checkout.js"></script>
    <!-- Toast Notification Container -->
<div id="toast" class="toast"></div>
</body>
</html>
